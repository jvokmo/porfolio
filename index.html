<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/favicon/site.webmanifest" />
    <title>Jayvee Portfolio — Desenvolvedor Front-end</title>
    <script>
      // Paint the saved theme background before render to avoid a flash (dark by default)
      ;(function () {
        var stored = localStorage.getItem("jv.theme")
        var dark = stored !== "light"
        document.documentElement.style.backgroundColor = dark ? "#14130F" : "#F4F2ED"
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
