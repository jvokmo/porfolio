<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JV — Desenvolvedor Front-end</title>
    <script>
      // Paint the saved theme background before render to avoid a flash (dark by default)
      ;(function () {
        var stored = localStorage.getItem("jv.theme")
        var dark = stored !== "light"
        document.documentElement.style.backgroundColor = dark ? "#14130F" : "#F4F2ED"
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
